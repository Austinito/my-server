name: Deploy (GHA-centered)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        options:
          - dev
          - test
          - prod
      xml_version:
        description: XML version (e.g. v100 or latest)
        required: true
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout server
        uses: actions/checkout@v4

      - name: Checkout xml repo
        uses: actions/checkout@v4
        with:
          repository: Austinito/xml-repo
          path: xml-repo

      - name: Prevent latest in prod
        run: |
          set -euo pipefail
          if [ "${{ inputs.environment }}" = "prod" ] && [ "${{ inputs.xml_version }}" = "latest" ]; then
            echo "ERROR: prod deployments must use an explicit XML tag"
            exit 1
          fi

      - name: Resolve XML version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_XML_VERSION: ${{ inputs.xml_version }}
          XML_OWNER: Austinito
          XML_REPO: xml-repo
        run: |
          set -euo pipefail

          if [ "${REQUESTED_XML_VERSION}" = "latest" ]; then
            echo "Resolving latest published XML release..."
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${XML_OWNER}/${XML_REPO}/releases/latest" \
              -o release.json
          else
            echo "Resolving requested XML release: ${REQUESTED_XML_VERSION}"
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${XML_OWNER}/${XML_REPO}/releases/tags/${REQUESTED_XML_VERSION}" \
              -o release.json
          fi

          XML_VERSION=$(jq -r '.tag_name' release.json)

          if [ -z "${XML_VERSION}" ] || [ "${XML_VERSION}" = "null" ]; then
            echo "ERROR: Could not resolve XML version"
            cat release.json
            exit 1
          fi

          echo "xml_version=${XML_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved XML version: ${XML_VERSION}"

      - name: Load XML
        run: |
          chmod +x scripts/load-xml.sh
          ./scripts/load-xml.sh \
            "${{ inputs.environment }}" \
            "${{ steps.resolve.outputs.xml_version }}" \
            ./xml-repo

      - name: Run server
        run: |
          chmod +x scripts/run-server.sh
          ./scripts/run-server.sh
